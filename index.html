<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus '26 | Farewell Invitation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: rgb(234, 215, 199);
            --dark: #2d2d2d;
            --gold: #b08d57;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0; /* Changed from 10px to 0 for better stability */
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            width: 100vw;
            padding-top: 10px; /* Your requested change */
            overflow: hidden; 
            position: fixed; 
        }

        .container {
            width: 94%; /* Slightly wider for mobile */
            max-width: 420px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .invitation-pic {
            width: 100%;
            height: 68vh; /* Force increased image height */
            object-fit: contain; /* Keeps image proportions perfect */
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            animation: zoomEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .action-area {
            margin-top: 10px; /* Tight spacing between image and button */
            text-align: center;
            width: 100%;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            position: relative;
            background-color: var(--dark);
            color: var(--white);
            border: none;
            padding: 14px 30px;
            font-family: 'Fira Code', monospace; 
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: auto; 
            white-space: nowrap; 
            outline: none;
        }

        /* Shine Effect */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s;
        }

        button:active {
            transform: scale(0.96);
        }

        button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--gold);
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        button:hover::after { width: 70%; }
        button:hover::before { left: 100%; }

        #thanksMsg {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
            color: var(--dark);
        }

        #thanksMsg.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .hidden { display: none; }

        @keyframes zoomEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="cheerSound" src="cheers.mp3" preload="auto"></audio>

    <div class="container">
        <img src="pic.png" alt="Nexus '26 Invitation" class="invitation-pic">

        <div class="action-area">
            <button id="acceptBtn" onclick="handleAccept()">Accept Invitation</button>
            
            <div id="thanksMsg" class="hidden">
                <h2 style="margin: 0; font-size: 1.6rem;">🎉 Thank you for accepting!</h2>
                <p style="margin-top: 6px; font-size: 1rem;"> See you there ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const cheerAudio = document.getElementById('cheerSound');
        const btn = document.getElementById('acceptBtn');
        const msg = document.getElementById('thanksMsg');

        function handleAccept() {
            cheerAudio.currentTime = 0;
            cheerAudio.play().catch(() => console.log("Audio play blocked"));

            btn.style.opacity = '0';
            btn.style.transform = 'scale(0.9) translateY(5px)';
            btn.style.pointerEvents = 'none';

            const count = 400;
            const defaults = { origin: { y: 0.75 }, zIndex: 999 };

            function fire(particleRatio, opts) {
                confetti({ ...defaults, ...opts, particleCount: Math.floor(count * particleRatio) });
            }

            fire(0.25, { spread: 60, startVelocity: 60, origin: { x: 0, y: 0.8 }, colors: ['#b08d57', '#ffffff'] });
            fire(0.25, { spread: 60, startVelocity: 60, origin: { x: 1, y: 0.8 }, colors: ['#b08d57', '#ffffff'] });
            fire(0.5, { spread: 100, startVelocity: 45, colors: ['#2d2d2d', '#b08d57', '#ffffff'] });

            setTimeout(() => {
                btn.classList.add('hidden');
                msg.classList.remove('hidden');
                msg.offsetHeight; 
                msg.classList.add('reveal');
            }, 400);
        }
    </script>
</body>
</html>
